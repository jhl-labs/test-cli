# Example: use test-cli in a consumer repository's CI.
# Copy this into .github/workflows/tests.yml in your project.
name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write   # for annotations

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # If your project needs a language toolchain, set it up first, e.g.:
      # - uses: actions/setup-go@v5
      # - uses: actions/setup-node@v4
      # - uses: actions/setup-python@v5

      - name: Run standardized tests & coverage
        id: tests
        uses: jhl-labs/test-cli@v0.1.0
        with:
          profile: ci
          target: .
          # languages: go,python        # optional: restrict autodetection
          fail-under: "80"              # fail if line coverage < 80%
          formats: stdout,json,junit,cobertura,markdown,html

      - name: Show outputs
        if: always()
        run: |
          echo "passed=${{ steps.tests.outputs.passed }}"
          echo "tests=${{ steps.tests.outputs.tests-total }} failed=${{ steps.tests.outputs.tests-failed }}"
          echo "coverage=${{ steps.tests.outputs.coverage-pct }}%"

      - name: Publish HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test
