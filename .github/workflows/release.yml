name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to release, e.g. v0.1.0
        required: true
      prerelease:
        description: Mark as a pre-release
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # zero dependencies; no go.sum

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if ! echo "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid version (expected semver vX.Y.Z): $version" >&2; exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Quality gate
        run: |
          gofmt -l . | (! grep .) || (echo "gofmt needed" && exit 1)
          go vet ./...
          go test -race ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/build-release-artifacts.sh

      - name: Generate release notes
        id: notes
        run: |
          prev="$(git describe --tags --abbrev=0 "${{ steps.ver.outputs.version }}^" 2>/dev/null || true)"
          {
            echo "## test-cli ${{ steps.ver.outputs.version }}"
            echo
            echo "Standardized test & coverage reports for python, typescript, go, rust, c#, java."
            echo
            echo "### Changes"
            if [ -n "$prev" ]; then
              git log --no-merges --pretty='- %s (%h)' "${prev}..${{ steps.ver.outputs.version }}"
            else
              git log --no-merges --pretty='- %s (%h)' -n 30
            fi
            echo
            echo "### Install"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.sh | VERSION=${{ steps.ver.outputs.version }} bash"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.ver.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag exists; refreshing assets."
            gh release upload "$tag" dist/release/* --clobber
          else
            gh release create "$tag" \
              --title "test-cli $tag" \
              --notes-file RELEASE_NOTES.md \
              ${{ inputs.prerelease == true && '--prerelease' || '' }} \
              dist/release/*
          fi
